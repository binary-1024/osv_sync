# OSV 漏洞数据库监控配置

# 数据源配置
source:
  base_url: "https://storage.googleapis.com/osv-vulnerabilities/"
  index_url: "https://storage.googleapis.com/osv-vulnerabilities/index.html"

# 本地存储配置
storage:
  data_dir: "./data"
  logs_dir: "./logs"
  download_all_zip: false  # 是否下载完整的 all.zip 文件
  
# 同步配置
sync:
  interval_hours: 24  # 同步间隔，单位为小时
  retry_attempts: 3   # 失败重试次数
  timeout: 300        # 请求超时时间，单位为秒
  
# 代理配置（可选）
proxy:
  enabled: false
  http: ""
  https: "" 

# 浏览器配置
browser:
  headless: true
  browser_type: "chromium"  # 可选: chromium, firefox, webkit
  timeout: 600000  # 超时时间（毫秒）
  viewport:
    width: 1280
    height: 800
  options:
    args: ["--no-sandbox", "--disable-gpu", "--disable-dev-shm-usage"]
